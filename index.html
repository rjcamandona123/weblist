<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weblist</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>💾</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Times New Roman', Times, Georgia, serif;
      background: #FFFFFF; color: #000000; min-height: 100vh;
    }
    #root { width: 900px; margin: 0 auto; padding: 16px 20px; }
    @media (max-width: 920px) { #root { width: 100%; padding: 12px 10px; } }

    a { cursor: pointer; }
    button { cursor: pointer; }

    .card {
      background: #FFF; border: 2px solid #C0C0C0; padding: 16px; margin-bottom: 16px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 8px; border-bottom: 2px solid #000; margin-bottom: 12px;
    }
    .card-title { font-size: 22px; font-weight: bold; color: #000080; }
    .card-count { font-size: 13px; color: #808080; font-weight: normal; }
    .card-scroll { max-height: 480px; overflow-y: auto; overflow-x: auto; }
    .card-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
    .card-scroll::-webkit-scrollbar-track { background: #E0E0E0; }
    .card-scroll::-webkit-scrollbar-thumb { background: #808080; border: 1px outset #C0C0C0; }

    .url-link {
      color: #0000FF; font-size: 15px; text-decoration: underline; cursor: pointer;
      word-break: break-all; display: inline-block; max-width: 100%;
    }
    .search-box input:focus { border-color: #000080; border-style: solid; }
    .search-box input::placeholder { color: #808080; }
    .search-box button {
      width: auto; padding: 0 20px; height: 40px; border: 2px outset #C0C0C0;
      background: #C0C0C0; color: #000; font-family: 'Times New Roman', Times, Georgia, serif;
      font-size: 14px; font-weight: bold; cursor: pointer; user-select: none;
    }
    .search-box button:hover { background: #D0D0D0; }
    .search-box button:active { border-style: inset; }

    .form-grid { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 200px; }
    .form-group label { display: block; font-size: 15px; color: #000; margin-bottom: 4px; font-weight: bold; }
    .form-group input {
      width: 100%; height: 36px; padding: 0 10px; border: 2px inset #C0C0C0;
      font-family: 'Times New Roman', Times, Georgia, serif;
      font-size: 15px; color: #000; background: #FFF; outline: none;
    }
    .form-group input:focus { border-color: #000080; border-style: solid; }
    .form-group input::placeholder { color: #808080; }
    .btn-submit {
      height: 36px; padding: 0 24px; margin-top: 8px; border: 2px outset #C0C0C0;
      background: #000080; color: #FFF; font-family: 'Times New Roman', Times, Georgia, serif;
      font-size: 14px; font-weight: bold; cursor: pointer; user-select: none;
    }
    .btn-submit:hover { background: #0000A0; }
    .btn-submit:active { border-style: inset; }

    .empty-state { text-align: center; padding: 30px 20px; }
    .empty-state p { color: #808080; font-size: 16px; line-height: 1.5; }
    .empty-state p:first-child { font-weight: bold; color: #000080; }

    .item-row { padding: 10px 0; border-bottom: 1px solid #C0C0C0; }
    .item-row:last-child { border-bottom: none; }

    .url-link {
      color: #0000FF; font-size: 15px; text-decoration: underline; cursor: pointer;
    }
    .url-link:hover { color: #FF0000; }

    .item-meta { font-size: 13px; color: #808080; margin-top: 3px; }

    .tag-btn {
      display: inline-block; padding: 2px 8px; margin: 3px 3px 0 0; border: 2px outset #C0C0C0;
      background: #E0E0E0; color: #000; font-size: 12px; font-weight: bold;
      font-family: 'Times New Roman', Times, Georgia, serif; cursor: pointer; user-select: none;
    }
    .tag-btn:hover { background: #D0D0D0; }
    .tag-btn:active { border-style: inset; }

    .vote-btn {
      padding: 3px 10px; margin-right: 6px; border: 2px outset #C0C0C0;
      background: #E0E0E0; color: #000; font-size: 12px; font-weight: bold;
      font-family: 'Times New Roman', Times, Georgia, serif; cursor: pointer; user-select: none;
    }
    .vote-btn:hover { background: #D0D0D0; }
    .vote-btn:active { border-style: inset; }
    .vote-count { font-size: 13px; color: #808080; margin-right: 8px; }
    .approved-tag { color: #006400; font-size: 12px; font-style: italic; font-weight: bold; }

    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-box {
      background: #FFF; border: 3px outset #C0C0C0; padding: 20px;
      max-width: 420px; width: 90%;
    }
    .modal-box h4 { margin: 0 0 12px; font-size: 18px; color: #000080; font-weight: bold; }
    .modal-box p { font-size: 14px; color: #000; margin: 0 0 14px; }
    .modal-opt {
      display: block; width: 100%; padding: 8px 12px; margin-bottom: 6px;
      border: 2px outset #C0C0C0; background: #FFF; color: #000;
      cursor: pointer; text-align: left; font-size: 14px; user-select: none;
      font-family: 'Times New Roman', Times, Georgia, serif;
    }
    .modal-opt:hover { background: #E0E0E0; }
    .modal-opt:active { border-style: inset; }
    .modal-cancel {
      display: block; width: 100%; padding: 8px; margin-top: 6px;
      border: 2px outset #C0C0C0; background: #800000; color: #FFF;
      cursor: pointer; font-size: 14px; font-weight: bold; user-select: none;
      font-family: 'Times New Roman', Times, Georgia, serif;
    }
    .modal-cancel:hover { background: #A00000; }
    .modal-cancel:active { border-style: inset; }

    .kebab-wrap { position: relative; display: inline-block; margin-left: 4px; vertical-align: middle; }
    .kebab-btn {
      background: #E0E0E0; border: 2px outset #C0C0C0; cursor: pointer;
      padding: 1px 6px 0; font-size: 16px; line-height: 1.2;
      color: #000; font-family: 'Times New Roman', Times, Georgia, serif; user-select: none;
    }
    .kebab-btn:hover { background: #D0D0D0; }
    .kebab-btn:active { border-style: inset; }
    .kebab-menu {
      position: absolute; left: 0; top: 100%; z-index: 100; min-width: 160px;
      background: #FFF; border: 2px outset #C0C0C0; padding: 2px; margin-top: 2px;
    }
    .kebab-menu button {
      display: block; width: 100%; padding: 6px 10px; border: 1px solid transparent;
      background: none; color: #000; font-size: 13px;
      font-family: 'Times New Roman', Times, Georgia, serif;
      text-align: left; cursor: pointer;
    }
    .kebab-menu button:hover { background: #E0E0E0; border-color: #808080; }
    .kebab-menu button.danger { color: #800000; font-weight: bold; }

    .item-iframe {
      width: 100%; height: 200px; border: 2px inset #C0C0C0;
      margin-top: 8px; background: #FFF; display: block;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="app.js"></script>
</body>
</html>
